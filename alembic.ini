[alembic]
script_location = alembic
prepend_sys_path = .
# The actual URL is injected at runtime from settings (see alembic/env.py);
# this placeholder is only used if env.py doesn't override it.
sqlalchemy.url = postgresql+asyncpg://triage:triage@postgres:5432/triage

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
