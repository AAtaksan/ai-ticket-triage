# Render Blueprint — one file that provisions your whole backend.
# In Render: New + → "Blueprint" → connect your GitHub repo → it reads this.
#
# This creates: an API web service and a background worker.
# Postgres: use a free Neon database and paste its URL as DATABASE_URL.
# Redis: use a free Upstash Redis and paste its URL as REDIS_URL.
# See DEPLOY.md for full setup instructions.
services:
  - type: web
    name: triage-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: ./docker/entrypoint.sh
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string in the dashboard
      - key: REDIS_URL
        sync: false          # paste your Upstash URL in the dashboard
      - key: JWT_SECRET
        generateValue: true  # Render generates a strong random secret
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false          # paste your Groq key in the dashboard (kept secret)
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ENVIRONMENT
        value: production

  - type: worker
    name: triage-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: arq app.workers.worker.WorkerSettings
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false          # same Neon connection string as the API
      - key: REDIS_URL
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
